<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nurse Info</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&family=Ubuntu:ital,wght@0,400;1,300&family=Varela+Round&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dates.css">

</head>
<body>
    <a href="index.html"><div class="careBuddy"><h5>CareBuddy</h5></div></a>
    <div class="heading"><h1>Nurse Details</h1></div>
    <div class=" nurse-container">
        <div class="nurse-divs" id="">
            <div class="nurseInfo">
                <img id="cardImage" src="" alt="">
                <div class="name">
                    <h5 id="cardTitle"></h5>
                    <h6 id="cardRating"></h6>
                </div>     
            </div>
            <div class="nurseDescription">
                <h4>Description</h4>
                <p id="cardDescription">
                </p>
                <h4>Speciality</h4>
                <div id="cardSpeciality">
                </div>
            </div>
            <div class="appointment">
                <h4>Book Appoitment</h4>
                <div class="selectDate " id="appointment">
                    <input class="btn btn-outline-primary" type="submit" value="Book"  name="" id="">
                </div>
                <div class="selectTime">
    
                </div>
                <div class=" hidden" id="nurseappoint">
                    <h1>Book an Appointment</h1>
                    <form id="appointmentForm">
                      <label for="appointmentDate">Select Date:</label>
                      <input type="date" id="appointmentDate" required>
                      <br>
                      <label for="appointmentTime">Select Time Slot:</label>
                      <select id="appointmentTime" required>
                        <option value="">Select Time</option>
                        <!-- Add time slot options dynamically using JavaScript -->
                      </select>
                      <br>
                      <button type="submit" id="book">Book Appointment</button>
                    </form>
                    <div id="appointmentDetails" class="hidden">
                      <h2>Appointment Details</h2>
                      <p id="selectedDate"></p>
                      <p id="selectedTime"></p>
                    </div>
                  </div>
            </div>
        </div>
        
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="dat.js"></script>
    <script src="script.js"></script> 
</body>
</html>
